# Render Blueprint — Deployment Configuration
# https://render.com/docs/blueprint-spec

services:
  # FastAPI Backend + Frontend (single service)
  - type: web
    name: fhp-detection-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: CONFIG_PATH
        value: "config.yaml"
      - key: MODEL_PATH
        value: "models/exported/stgcn_fhp.pth"
      - key: PYTHON_UNBUFFERED
        value: "1"
    healthCheckPath: /health
    buildFilter:
      paths:
        - src/**
        - api/**
        - web/**
        - models/exported/**
        - models/pose_landmarker_lite.task
        - config.yaml
        - Dockerfile
        - requirements-api.txt
